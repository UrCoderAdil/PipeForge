apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: pipeforge-ingress
  namespace: pipeforge
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - pipeforge.yourdomain.com
        - api.pipeforge.yourdomain.com
      secretName: pipeforge-tls
  rules:
    - host: pipeforge.yourdomain.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: pipeforge-frontend
                port:
                  number: 3000
    - host: api.pipeforge.yourdomain.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: pipeforge-backend
                port:
                  number: 4000
