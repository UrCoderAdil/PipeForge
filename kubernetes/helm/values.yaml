replicaCount:
  backend: 3
  frontend: 2

image:
  registry: ghcr.io
  repository: your-org/pipeforge
  pullPolicy: Always
  tag: latest

backend:
  port: 4000
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 20
    targetCPUUtilizationPercentage: 70

frontend:
  port: 3000
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

ingress:
  enabled: true
  className: nginx
  host: pipeforge.yourdomain.com
  apiHost: api.pipeforge.yourdomain.com
  tls: true
  certIssuer: letsencrypt-prod

postgresql:
  enabled: true
  auth:
    username: pipeforge
    database: pipeforge
  primary:
    persistence:
      size: 10Gi
