apiVersion: apps/v1
kind: Deployment
metadata:
  name: pipeforge-frontend
  namespace: pipeforge
  labels:
    app: pipeforge
    component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: pipeforge
      component: frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: pipeforge
        component: frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/your-org/pipeforge/frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env:
            - name: NEXT_PUBLIC_API_URL
              valueFrom:
                configMapKeyRef:
                  name: pipeforge-config
                  key: api-url
            - name: NEXT_PUBLIC_WS_URL
              valueFrom:
                configMapKeyRef:
                  name: pipeforge-config
                  key: ws-url
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 15

---
apiVersion: v1
kind: Service
metadata:
  name: pipeforge-frontend
  namespace: pipeforge
spec:
  selector:
    app: pipeforge
    component: frontend
  ports:
    - port: 3000
      targetPort: 3000
  type: ClusterIP
