apiVersion: v1
kind: ConfigMap
metadata:
  name: pipeforge-config
  namespace: pipeforge
data:
  api-url: "https://api.pipeforge.yourdomain.com"
  ws-url: "wss://api.pipeforge.yourdomain.com"

---
# Create this secret manually — never commit real secrets to git:
# kubectl create secret generic pipeforge-secrets \
#   --from-literal=database-url="postgresql://..." \
#   --from-literal=jwt-secret="your-jwt-secret" \
#   -n pipeforge
apiVersion: v1
kind: Secret
metadata:
  name: pipeforge-secrets
  namespace: pipeforge
type: Opaque
data:
  database-url: <base64-encoded-database-url>
  jwt-secret: <base64-encoded-jwt-secret>
