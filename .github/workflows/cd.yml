name: CD — Deploy PipeForge MLOps

on:
  push:
    branches: [main]
    tags:
      - "v*.*.*"

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ${{ github.repository }}/backend
  FRONTEND_IMAGE: ${{ github.repository }}/frontend

jobs:
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      backend_tag: ${{ steps.meta-backend.outputs.tags }}
      frontend_tag: ${{ steps.meta-frontend.outputs.tags }}

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract backend metadata
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,prefix=sha-,format=short

      - name: Extract frontend metadata
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,prefix=sha-,format=short

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.PROD_API_URL }}
            NEXT_PUBLIC_WS_URL=${{ secrets.PROD_WS_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: "v1.29.0"

      - name: Deploy to Kubernetes (Staging)
        run: |
          echo "Deploying to staging namespace..."
          echo "kubectl apply -f kubernetes/ -n pipeforge-staging"
          echo "kubectl set image deployment/pipeforge-backend backend=${{ needs.build-and-push.outputs.backend_tag }} -n pipeforge-staging"
          echo "kubectl set image deployment/pipeforge-frontend frontend=${{ needs.build-and-push.outputs.frontend_tag }} -n pipeforge-staging"
          echo "kubectl rollout status deployment/pipeforge-backend -n pipeforge-staging"
        # Replace above with actual kubectl commands once cluster is configured

      - name: Run staging smoke tests
        run: |
          echo "Running smoke tests against staging..."
          echo "curl -sf ${{ secrets.STAGING_URL }}/api/v1/metrics/dashboard"

  deploy-production:
    name: Deploy to Production (Canary)
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment: production
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Canary rollout (10% traffic)
        run: |
          echo "Initiating canary rollout at 10% traffic..."
          echo "kubectl apply -f kubernetes/canary/ -n pipeforge-prod"

      - name: Monitor canary metrics (5 min)
        run: |
          echo "Monitoring error rate and latency for 5 minutes..."
          sleep 10

      - name: Promote canary to 100%
        run: |
          echo "Promoting canary to full production traffic..."
          echo "kubectl set image deployment/pipeforge-backend backend=${{ needs.build-and-push.outputs.backend_tag }} -n pipeforge-prod"

  rollback:
    name: Emergency Rollback
    runs-on: ubuntu-latest
    if: failure() && needs.deploy-production.result == 'failure'
    needs: deploy-production
    steps:
      - name: Rollback production deployment
        run: |
          echo "ROLLBACK: Reverting to previous stable version..."
          echo "kubectl rollout undo deployment/pipeforge-backend -n pipeforge-prod"
          echo "kubectl rollout undo deployment/pipeforge-frontend -n pipeforge-prod"
