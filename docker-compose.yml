version: "3.9"

services:
  postgres:
    image: postgres:17
    container_name: pipeforge-db
    restart: always
    environment:
      POSTGRES_USER: pipeforge
      POSTGRES_PASSWORD: pipeforge123
      POSTGRES_DB: pipeforge
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
